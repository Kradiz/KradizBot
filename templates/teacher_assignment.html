<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>สั่งงานนักเรียน</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <style>
        * { box-sizing: border-box; font-family: Arial, sans-serif; }
        body { margin: 0; padding: 16px; background: #f5f7fb; color: #222; }
        .container { max-width: 480px; margin: 0 auto; background: white; border-radius: 18px; padding: 20px; box-shadow: 0 6px 20px rgba(0,0,0,0.08); }
        h1 { font-size: 22px; margin: 0 0 8px; text-align: center; }
        .subtitle { font-size: 14px; color: #666; text-align: center; margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-top: 14px; margin-bottom: 6px; font-size: 15px; }
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid #d0d7de; border-radius: 12px; font-size: 16px; outline: none; }
        textarea { min-height: 90px; resize: vertical; }
        button { width: 100%; margin-top: 22px; padding: 14px; background: #06c755; color: white; border: none; border-radius: 14px; font-size: 17px; font-weight: bold; cursor: pointer; }
        button:disabled { background: #aaa; }
        .status { margin-top: 16px; padding: 12px; border-radius: 12px; font-size: 14px; display: none; line-height: 1.5; }
        .success { display: block; background: #e8f8ee; color: #087a34; border: 1px solid #b7ebc8; }
        .error { display: block; background: #fff0f0; color: #b00020; border: 1px solid #ffc7c7; }
    </style>
</head>
<body>
    <div class="container">
        <h1>สั่งงานนักเรียน</h1>
        <div class="subtitle">เลือกห้องและกรอกรายละเอียดงาน</div>

        <label>เลือกห้อง</label>
        <select id="classroom">
            <option value="">กำลังโหลดห้อง...</option>
        </select>

        <label>ชื่องาน</label>
        <input type="text" id="title" placeholder="เช่น แบบฝึกหัดบทที่ 1">

        <label>รายละเอียดงาน</label>
        <textarea id="description" placeholder="รายละเอียดงานที่ต้องการให้นักเรียนทำ"></textarea>

        <label>วันเริ่มส่ง</label>
        <input type="date" id="startDate">

        <label>วันสิ้นสุด</label>
        <input type="date" id="dueDate">

        <label>คะแนนเต็ม</label>
        <input type="number" id="maxScore" placeholder="เช่น 10">

        <button id="saveBtn" onclick="saveAssignment()">บันทึกงาน</button>
        <div id="statusBox" class="status"></div>
    </div>

    <script>
        const LIFF_ID = "{{ liff_id }}";
        let lineUserId = "";

        async function main() {
            try {
                await liff.init({ liffId: LIFF_ID });

                if (!liff.isLoggedIn()) {
                    liff.login();
                    return;
                }

                const profile = await liff.getProfile();
                lineUserId = profile.userId;

                await loadRooms();

            } catch (error) {
                showError("เปิด LIFF ไม่สำเร็จ: " + error.message);
            }
        }

        async function loadRooms() {
            const res = await fetch("/api/teacher/rooms?teacher_line_user_id=" + encodeURIComponent(lineUserId));
            const result = await res.json();

            const select = document.getElementById("classroom");
            select.innerHTML = "";

            if (!result.success || result.rooms.length === 0) {
                select.innerHTML = '<option value="">ยังไม่ได้ตั้งค่าห้อง</option>';
                return;
            }

            result.rooms.forEach(room => {
                const option = document.createElement("option");
                option.value = room;
                option.textContent = room;
                select.appendChild(option);
            });
        }

        async function saveAssignment() {
            const classroom = document.getElementById("classroom").value;
            const title = document.getElementById("title").value.trim();
            const description = document.getElementById("description").value.trim();
            const startDate = document.getElementById("startDate").value;
            const dueDate = document.getElementById("dueDate").value;
            const maxScore = document.getElementById("maxScore").value;
            const btn = document.getElementById("saveBtn");

            if (!classroom) return showError("กรุณาเลือกห้อง");
            if (!title) return showError("กรุณากรอกชื่องาน");

            btn.disabled = true;
            btn.innerText = "กำลังบันทึก...";

            try {
                const res = await fetch("/api/teacher/assignment", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({
                        teacher_line_user_id: lineUserId,
                        classroom: classroom,
                        title: title,
                        description: description,
                        start_date: startDate,
                        due_date: dueDate,
                        max_score: maxScore
                    })
                });

                const result = await res.json();

                if (!res.ok || !result.success) {
                    showError(result.message || "บันทึกไม่สำเร็จ");
                    return;
                }

                showSuccess("บันทึกงานเรียบร้อยแล้ว<br>เพิ่มหัวงานในแท็บห้องแล้ว");

                document.getElementById("title").value = "";
                document.getElementById("description").value = "";
                document.getElementById("startDate").value = "";
                document.getElementById("dueDate").value = "";
                document.getElementById("maxScore").value = "";

            } catch (error) {
                showError("เกิดข้อผิดพลาด: " + error.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "บันทึกงาน";
            }
        }

        function showSuccess(msg) {
            const box = document.getElementById("statusBox");
            box.className = "status success";
            box.innerHTML = msg;
        }

        function showError(msg) {
            const box = document.getElementById("statusBox");
            box.className = "status error";
            box.innerHTML = msg;
        }

        main();
    </script>
</body>
</html>
