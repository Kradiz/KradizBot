<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>สั่งงาน</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <style>
        * { box-sizing: border-box; }

        body {
            font-family: Arial, "Tahoma", sans-serif;
            background: #f4f7fb;
            margin: 0;
            padding: 16px;
            color: #222;
        }

        .container {
            max-width: 560px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 18px;
            padding: 22px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }

        h1 {
            text-align: center;
            color: #1f5eff;
            font-size: 24px;
            margin: 0 0 8px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 18px;
        }

        .hint {
            background: #eef4ff;
            border: 1px solid #c8d9ff;
            color: #2450a4;
            border-radius: 12px;
            padding: 12px;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-top: 14px;
            margin-bottom: 6px;
            font-weight: bold;
            font-size: 15px;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 13px 14px;
            border: 1px solid #d6dbe6;
            border-radius: 12px;
            font-size: 16px;
            background: #fbfcff;
            outline: none;
        }

        textarea {
            min-height: 110px;
            resize: vertical;
            line-height: 1.5;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: #1f5eff;
            background: #ffffff;
        }

        .small {
            font-size: 13px;
            color: #777;
            margin-top: 5px;
            line-height: 1.5;
        }

        button {
            width: 100%;
            margin-top: 22px;
            padding: 14px;
            border: none;
            border-radius: 14px;
            background: #1f5eff;
            color: #fff;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
        }

        button:disabled {
            background: #9aa9d6;
            cursor: not-allowed;
        }

        .message {
            margin-top: 16px;
            padding: 12px;
            border-radius: 12px;
            display: none;
            font-size: 15px;
            line-height: 1.5;
            white-space: pre-line;
        }

        .success {
            background: #e8f8ee;
            color: #137333;
            border: 1px solid #bde8ca;
        }

        .error {
            background: #fdeaea;
            color: #b3261e;
            border: 1px solid #f4b4b4;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>สั่งงาน</h1>
    <div class="subtitle">
        ใช้สำหรับสร้างงานใหม่ให้ห้องที่ครูดูแล
    </div>

    <div class="hint">
        <b>ตัวอย่างการกรอก</b><br>
        เลือกห้อง: 401<br>
        ชื่องาน: ใบงานที่ 1 เรื่องแรงและการเคลื่อนที่<br>
        รายละเอียดงาน: ทำข้อ 1-10 แล้วถ่ายรูปหรือส่งเป็น PDF<br>
        วันเริ่มส่ง: 2026-05-16<br>
        วันสิ้นสุด: 2026-05-20<br>
        คะแนนเต็ม: 10
    </div>

    <label for="classroom">เลือกห้อง</label>
    <select id="classroom">
        <option value="">กำลังโหลดห้อง...</option>
    </select>

    <label for="title">ชื่องาน</label>
    <input type="text" id="title" placeholder="ตัวอย่าง: ใบงานที่ 1 เรื่องแรงและการเคลื่อนที่">

    <label for="description">รายละเอียดงาน</label>
    <textarea id="description" placeholder="ตัวอย่าง: ทำข้อ 1-10 แล้วถ่ายรูปหรือส่งเป็น PDF"></textarea>

    <label for="startDate">วันเริ่มส่ง</label>
    <input type="date" id="startDate">
    <div class="small">ระบบจะส่งค่าเป็นรูปแบบ YYYY-MM-DD</div>

    <label for="dueDate">วันสิ้นสุด</label>
    <input type="date" id="dueDate">

    <label for="maxScore">คะแนนเต็ม</label>
    <input type="number" id="maxScore" placeholder="ตัวอย่าง: 10" min="0">

    <button id="saveBtn" onclick="saveAssignment()">บันทึกงาน</button>

    <div id="messageBox" class="message"></div>
</div>

<script>
    const LIFF_ID = "{{ liff_id }}";
    let teacherLineUserId = "";

    async function main() {
        try {
            await liff.init({ liffId: LIFF_ID });

            if (!liff.isLoggedIn()) {
                liff.login();
                return;
            }

            const profile = await liff.getProfile();
            teacherLineUserId = profile.userId;

            await loadRooms();

        } catch (error) {
            showMessage("เปิด LIFF ไม่สำเร็จ: " + error.message, "error");
        }
    }

    function showMessage(text, type) {
        const box = document.getElementById("messageBox");
        box.innerText = text;
        box.className = "message " + type;
        box.style.display = "block";
    }

    async function loadRooms() {
        const select = document.getElementById("classroom");

        try {
            const res = await fetch("/api/teacher/rooms?teacher_line_user_id=" + encodeURIComponent(teacherLineUserId));
            const data = await res.json();

            select.innerHTML = "";

            if (!data.success) {
                select.innerHTML = `<option value="">โหลดห้องไม่สำเร็จ</option>`;
                showMessage(data.message || "โหลดห้องไม่สำเร็จ", "error");
                return;
            }

            const rooms = data.rooms || [];

            if (rooms.length === 0) {
                select.innerHTML = `<option value="">ยังไม่ได้ตั้งค่าห้อง</option>`;
                showMessage("ยังไม่ได้ตั้งค่าห้อง กรุณาไปเมนูตั้งค่าห้องก่อน", "error");
                return;
            }

            select.innerHTML = `<option value="">-- เลือกห้อง --</option>`;

            rooms.forEach(room => {
                const opt = document.createElement("option");
                opt.value = room;
                opt.textContent = room;
                select.appendChild(opt);
            });

        } catch (error) {
            select.innerHTML = `<option value="">โหลดห้องไม่สำเร็จ</option>`;
            showMessage("เกิดข้อผิดพลาด: " + error.message, "error");
        }
    }

    async function saveAssignment() {
        const classroom = document.getElementById("classroom").value.trim();
        const title = document.getElementById("title").value.trim();
        const description = document.getElementById("description").value.trim();
        const startDate = document.getElementById("startDate").value.trim();
        const dueDate = document.getElementById("dueDate").value.trim();
        const maxScore = document.getElementById("maxScore").value.trim();
        const btn = document.getElementById("saveBtn");

        if (!teacherLineUserId) {
            showMessage("ไม่พบ LINE userId กรุณาปิดแล้วเปิดใหม่", "error");
            return;
        }

        if (!classroom) {
            showMessage("กรุณาเลือกห้อง", "error");
            return;
        }

        if (!title) {
            showMessage("กรุณากรอกชื่องาน", "error");
            return;
        }

        btn.disabled = true;
        btn.innerText = "กำลังบันทึก...";

        try {
            const res = await fetch("/api/teacher/assignment", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    teacher_line_user_id: teacherLineUserId,
                    classroom: classroom,
                    title: title,
                    description: description,
                    start_date: startDate,
                    due_date: dueDate,
                    max_score: maxScore
                })
            });

            const data = await res.json();

            if (data.success) {
                showMessage("บันทึกงานเรียบร้อยแล้ว\nเพิ่มหัวงานในแท็บห้องแล้ว", "success");
                btn.innerText = "บันทึกสำเร็จ";

                setTimeout(() => {
                    if (liff.isInClient()) {
                        liff.closeWindow();
                    }
                }, 1600);

            } else {
                showMessage(data.message || "บันทึกงานไม่สำเร็จ", "error");
                btn.disabled = false;
                btn.innerText = "บันทึกงาน";
            }

        } catch (error) {
            showMessage("เกิดข้อผิดพลาด: " + error.message, "error");
            btn.disabled = false;
            btn.innerText = "บันทึกงาน";
        }
    }

    main();
</script>

</body>
</html>
