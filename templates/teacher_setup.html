<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ตั้งค่าห้องที่ครูดูแล</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <style>
        * { box-sizing: border-box; font-family: Arial, sans-serif; }
        body { margin: 0; padding: 16px; background: #f5f7fb; color: #222; }
        .container { max-width: 480px; margin: 0 auto; background: white; border-radius: 18px; padding: 20px; box-shadow: 0 6px 20px rgba(0,0,0,0.08); }
        h1 { font-size: 22px; margin: 0 0 8px; text-align: center; }
        .subtitle { font-size: 14px; color: #666; text-align: center; margin-bottom: 20px; line-height: 1.5; }
        label { display: block; font-weight: bold; margin-top: 14px; margin-bottom: 6px; font-size: 15px; }
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid #d0d7de; border-radius: 12px; font-size: 16px; outline: none; }
        textarea { min-height: 90px; resize: vertical; }
        input:focus, textarea:focus, select:focus { border-color: #06c755; box-shadow: 0 0 0 3px rgba(6,199,85,0.12); }
        button { width: 100%; margin-top: 22px; padding: 14px; background: #06c755; color: white; border: none; border-radius: 14px; font-size: 17px; font-weight: bold; cursor: pointer; }
        button:disabled { background: #aaa; }
        .status { margin-top: 16px; padding: 12px; border-radius: 12px; font-size: 14px; display: none; line-height: 1.5; }
        .success { display: block; background: #e8f8ee; color: #087a34; border: 1px solid #b7ebc8; }
        .error { display: block; background: #fff0f0; color: #b00020; border: 1px solid #ffc7c7; }
        .profile-box { margin-top: 12px; padding: 10px; background: #f1f8f4; border-radius: 12px; font-size: 13px; color: #444; display: none; }
        .example { background: #f7f7f7; padding: 10px; border-radius: 10px; font-size: 13px; margin-top: 8px; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="container">
        <h1>ตั้งค่าห้องที่ครูดูแล</h1>
        <div class="subtitle">
            กรอกชื่อครูและห้องที่ดูแล<br>
            ระบบจะสร้างแท็บสรุปงานแยกตามห้องให้อัตโนมัติ
        </div>

        <div id="profileBox" class="profile-box"></div>

        <label>ชื่อครู</label>
        <input type="text" id="teacherName" placeholder="เช่น ครูสมชาย">

        <label>ห้องที่ดูแล</label>
        <textarea id="rooms" placeholder="เช่น 401,402,403"></textarea>

        <div class="example">
            ตัวอย่าง:<br>
            401,402,403<br>
            หรือ ม.4/1,ม.4/2,ม.4/3
        </div>

        <button id="saveBtn" onclick="saveData()">บันทึกข้อมูล</button>
        <div id="statusBox" class="status"></div>
    </div>

    <script>
        const LIFF_ID = "{{ liff_id }}";
        let lineUserId = "";
        let lineDisplayName = "";

        async function main() {
            try {
                await liff.init({ liffId: LIFF_ID });

                if (!liff.isLoggedIn()) {
                    liff.login();
                    return;
                }

                const profile = await liff.getProfile();
                lineUserId = profile.userId;
                lineDisplayName = profile.displayName;

                document.getElementById("profileBox").style.display = "block";
                document.getElementById("profileBox").innerHTML = "เข้าสู่ระบบด้วย LINE: <b>" + lineDisplayName + "</b>";

                document.getElementById("teacherName").value = lineDisplayName;

            } catch (error) {
                showError("เปิด LIFF ไม่สำเร็จ: " + error.message);
            }
        }

        async function saveData() {
            const teacherName = document.getElementById("teacherName").value.trim();
            const rooms = document.getElementById("rooms").value.trim();
            const btn = document.getElementById("saveBtn");

            if (!teacherName) return showError("กรุณากรอกชื่อครู");
            if (!rooms) return showError("กรุณากรอกห้องที่ดูแล");
            if (!lineUserId) return showError("ไม่พบ LINE userId");

            btn.disabled = true;
            btn.innerText = "กำลังบันทึก...";

            try {
                const res = await fetch("/api/teacher/setup", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({
                        teacher_line_user_id: lineUserId,
                        teacher_name: teacherName,
                        rooms: rooms
                    })
                });

                const result = await res.json();

                if (!res.ok || !result.success) {
                    showError(result.message || "บันทึกไม่สำเร็จ");
                    return;
                }

                showSuccess("บันทึกเรียบร้อยแล้ว<br>สร้างแท็บห้องเรียบร้อยแล้ว");

            } catch (error) {
                showError("เกิดข้อผิดพลาด: " + error.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "บันทึกข้อมูล";
            }
        }

        function showSuccess(msg) {
            const box = document.getElementById("statusBox");
            box.className = "status success";
            box.innerHTML = msg;
        }

        function showError(msg) {
            const box = document.getElementById("statusBox");
            box.className = "status error";
            box.innerHTML = msg;
        }

        main();
    </script>
</body>
</html>
