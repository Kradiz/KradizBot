<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>งานค้าง</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <style>
        * { box-sizing: border-box; font-family: Arial, sans-serif; }
        body { margin: 0; padding: 16px; background: #f5f7fb; color: #222; }
        .container { max-width: 480px; margin: 0 auto; background: white; border-radius: 18px; padding: 20px; box-shadow: 0 6px 20px rgba(0,0,0,0.08); }
        h1 { font-size: 22px; margin: 0 0 8px; text-align: center; }
        label { display: block; font-weight: bold; margin-top: 14px; margin-bottom: 6px; font-size: 15px; }
        select { width: 100%; padding: 12px; border: 1px solid #d0d7de; border-radius: 12px; font-size: 16px; }
        button { width: 100%; margin-top: 18px; padding: 14px; background: #06c755; color: white; border: none; border-radius: 14px; font-size: 17px; font-weight: bold; }
        .list { margin-top: 18px; }
        .item { padding: 12px; border: 1px solid #ddd; border-radius: 12px; margin-bottom: 10px; background: #fafafa; }
        .empty { margin-top: 18px; padding: 14px; background: #e8f8ee; color: #087a34; border-radius: 12px; }
        .error { margin-top: 18px; padding: 14px; background: #fff0f0; color: #b00020; border-radius: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>รายชื่อนักเรียนที่ยังไม่ส่งงาน</h1>

        <label>เลือกห้อง</label>
        <select id="classroom" onchange="loadAssignments()">
            <option value="">กำลังโหลดห้อง...</option>
        </select>

        <label>เลือกงาน</label>
        <select id="assignment">
            <option value="">กรุณาเลือกห้องก่อน</option>
        </select>

        <button onclick="loadPending()">ดูรายชื่อที่ยังไม่ส่ง</button>

        <div id="resultBox" class="list"></div>
    </div>

    <script>
        const LIFF_ID = "{{ liff_id }}";
        let lineUserId = "";

        async function main() {
            try {
                await liff.init({ liffId: LIFF_ID });

                if (!liff.isLoggedIn()) {
                    liff.login();
                    return;
                }

                const profile = await liff.getProfile();
                lineUserId = profile.userId;

                await loadRooms();

            } catch (error) {
                showError("เปิด LIFF ไม่สำเร็จ: " + error.message);
            }
        }

        async function loadRooms() {
            const res = await fetch("/api/teacher/rooms?teacher_line_user_id=" + encodeURIComponent(lineUserId));
            const result = await res.json();

            const select = document.getElementById("classroom");
            select.innerHTML = "";

            if (!result.success || result.rooms.length === 0) {
                select.innerHTML = '<option value="">ยังไม่ได้ตั้งค่าห้อง</option>';
                return;
            }

            select.innerHTML = '<option value="">เลือกห้อง</option>';

            result.rooms.forEach(room => {
                const option = document.createElement("option");
                option.value = room;
                option.textContent = room;
                select.appendChild(option);
            });
        }

        async function loadAssignments() {
            const classroom = document.getElementById("classroom").value;
            const select = document.getElementById("assignment");

            select.innerHTML = '<option value="">กำลังโหลดงาน...</option>';

            if (!classroom) {
                select.innerHTML = '<option value="">กรุณาเลือกห้องก่อน</option>';
                return;
            }

            const res = await fetch("/api/teacher/assignments?classroom=" + encodeURIComponent(classroom));
            const result = await res.json();

            select.innerHTML = "";

            if (!result.success || result.assignments.length === 0) {
                select.innerHTML = '<option value="">ยังไม่มีงาน</option>';
                return;
            }

            result.assignments.forEach(item => {
                const option = document.createElement("option");
                option.value = item.assignment_id;
                option.textContent = item.title;
                select.appendChild(option);
            });
        }

        async function loadPending() {
            const classroom = document.getElementById("classroom").value;
            const assignmentId = document.getElementById("assignment").value;

            if (!classroom) return showError("กรุณาเลือกห้อง");
            if (!assignmentId) return showError("กรุณาเลือกงาน");

            const url = "/api/teacher/pending?classroom=" + encodeURIComponent(classroom) + "&assignment_id=" + encodeURIComponent(assignmentId);
            const res = await fetch(url);
            const result = await res.json();

            const box = document.getElementById("resultBox");
            box.innerHTML = "";

            if (!result.success) {
                showError(result.message || "โหลดข้อมูลไม่สำเร็จ");
                return;
            }

            if (result.students.length === 0) {
                box.innerHTML = '<div class="empty">นักเรียนส่งครบแล้ว</div>';
                return;
            }

            result.students.forEach((student, index) => {
                const div = document.createElement("div");
                div.className = "item";
                div.innerHTML = (index + 1) + ". " + student.student_name + "<br>เลขที่/รหัส: " + student.student_code;
                box.appendChild(div);
            });
        }

        function showError(msg) {
            document.getElementById("resultBox").innerHTML = '<div class="error">' + msg + '</div>';
        }

        main();
    </script>
</body>
</html>
