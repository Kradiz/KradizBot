<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ประกาศของห้อง</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <style>
        * { box-sizing: border-box; }

        body {
            font-family: Arial, "Tahoma", sans-serif;
            background: #f4f7fb;
            margin: 0;
            padding: 16px;
            color: #222;
        }

        .container {
            max-width: 560px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 18px;
            padding: 22px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }

        h1 {
            text-align: center;
            color: #1f5eff;
            font-size: 24px;
            margin: 0 0 8px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 18px;
        }

        .hint {
            background: #eef4ff;
            border: 1px solid #c8d9ff;
            color: #2450a4;
            border-radius: 12px;
            padding: 12px;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 16px;
        }

        .card {
            border: 1px solid #d6dbe6;
            border-radius: 14px;
            padding: 14px;
            margin-bottom: 12px;
            background: #fbfcff;
        }

        .meta {
            font-size: 13px;
            color: #666;
            margin-bottom: 8px;
            line-height: 1.5;
        }

        .msg {
            font-size: 15px;
            line-height: 1.6;
            white-space: pre-line;
        }

        .message {
            margin-top: 16px;
            padding: 12px;
            border-radius: 12px;
            font-size: 15px;
            line-height: 1.5;
            white-space: pre-line;
        }

        .success {
            background: #e8f8ee;
            color: #137333;
            border: 1px solid #bde8ca;
        }

        .error {
            background: #fdeaea;
            color: #b3261e;
            border: 1px solid #f4b4b4;
        }

        .info {
            background: #eef4ff;
            color: #2450a4;
            border: 1px solid #c8d9ff;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>ประกาศของห้อง</h1>
    <div class="subtitle">
        แสดงประกาศที่ครูส่งถึงห้องของคุณ
    </div>

    <div class="hint">
        ถ้าไม่เห็นประกาศ อาจยังไม่มีประกาศสำหรับห้องของคุณ หรือยังไม่ได้ลงทะเบียนห้องเรียน
    </div>

    <div id="list"></div>
    <div id="messageBox" class="message info">กำลังโหลดประกาศ...</div>
</div>

<script>
    const LIFF_ID = "{{ liff_id }}";
    let lineUserId = "";

    async function main() {
        try {
            await liff.init({ liffId: LIFF_ID });

            if (!liff.isLoggedIn()) {
                liff.login();
                return;
            }

            const profile = await liff.getProfile();
            lineUserId = profile.userId;

            await loadAnnouncements();

        } catch (error) {
            showMessage("เปิด LIFF ไม่สำเร็จ: " + error.message, "error");
        }
    }

    function showMessage(text, type) {
        const box = document.getElementById("messageBox");
        box.innerText = text;
        box.className = "message " + type;
        box.style.display = "block";
    }

    async function loadAnnouncements() {
        const list = document.getElementById("list");

        try {
            const res = await fetch("/api/student/announcements?line_user_id=" + encodeURIComponent(lineUserId));
            const data = await res.json();

            list.innerHTML = "";

            if (!data.success) {
                showMessage(data.message || "โหลดประกาศไม่สำเร็จ", "error");
                return;
            }

            const announcements = data.announcements || [];

            if (announcements.length === 0) {
                showMessage("ยังไม่มีประกาศสำหรับห้องของคุณ", "info");
                return;
            }

            document.getElementById("messageBox").style.display = "none";

            announcements.forEach(item => {
                const div = document.createElement("div");
                div.className = "card";
                div.innerHTML = `
                    <div class="meta">
                        ห้อง ${item.classroom || "-"}<br>
                        โดย ${item.teacher_name || "ครู"} | ${item.created_at || "-"}
                    </div>
                    <div class="msg">${item.message || ""}</div>
                `;
                list.appendChild(div);
            });

        } catch (error) {
            showMessage("เกิดข้อผิดพลาด: " + error.message, "error");
        }
    }

    main();
</script>

</body>
</html>
