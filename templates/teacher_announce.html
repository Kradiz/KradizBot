<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ประกาศถึงนักเรียน</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <style>
        * { box-sizing: border-box; font-family: Arial, sans-serif; }
        body { margin: 0; padding: 16px; background: #f5f7fb; color: #222; }
        .container { max-width: 480px; margin: 0 auto; background: white; border-radius: 18px; padding: 20px; box-shadow: 0 6px 20px rgba(0,0,0,0.08); }
        h1 { font-size: 22px; margin: 0 0 8px; text-align: center; }
        .subtitle { font-size: 14px; color: #666; text-align: center; margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-top: 14px; margin-bottom: 6px; font-size: 15px; }
        select, textarea { width: 100%; padding: 12px; border: 1px solid #d0d7de; border-radius: 12px; font-size: 16px; }
        textarea { min-height: 120px; resize: vertical; }
        button { width: 100%; margin-top: 22px; padding: 14px; background: #06c755; color: white; border: none; border-radius: 14px; font-size: 17px; font-weight: bold; }
        .status { margin-top: 16px; padding: 12px; border-radius: 12px; font-size: 14px; display: none; line-height: 1.5; }
        .success { display: block; background: #e8f8ee; color: #087a34; border: 1px solid #b7ebc8; }
        .error { display: block; background: #fff0f0; color: #b00020; border: 1px solid #ffc7c7; }
    </style>
</head>
<body>
    <div class="container">
        <h1>ประกาศถึงนักเรียน</h1>
        <div class="subtitle">เลือกห้องและพิมพ์ข้อความประกาศ</div>

        <label>เลือกห้อง</label>
        <select id="classroom">
            <option value="">กำลังโหลดห้อง...</option>
        </select>

        <label>ข้อความประกาศ</label>
        <textarea id="message" placeholder="เช่น พรุ่งนี้ให้นำสมุดมาด้วย"></textarea>

        <button id="sendBtn" onclick="sendAnnouncement()">ส่งประกาศ</button>

        <div id="statusBox" class="status"></div>
    </div>

    <script>
        const LIFF_ID = "{{ liff_id }}";
        let lineUserId = "";
        let lineDisplayName = "";

        async function main() {
            try {
                await liff.init({ liffId: LIFF_ID });

                if (!liff.isLoggedIn()) {
                    liff.login();
                    return;
                }

                const profile = await liff.getProfile();
                lineUserId = profile.userId;
                lineDisplayName = profile.displayName;

                await loadRooms();

            } catch (error) {
                showError("เปิด LIFF ไม่สำเร็จ: " + error.message);
            }
        }

        async function loadRooms() {
            const res = await fetch("/api/teacher/rooms?teacher_line_user_id=" + encodeURIComponent(lineUserId));
            const result = await res.json();

            const select = document.getElementById("classroom");
            select.innerHTML = "";

            if (!result.success || result.rooms.length === 0) {
                select.innerHTML = '<option value="">ยังไม่ได้ตั้งค่าห้อง</option>';
                return;
            }

            result.rooms.forEach(room => {
                const option = document.createElement("option");
                option.value = room;
                option.textContent = room;
                select.appendChild(option);
            });
        }

        async function sendAnnouncement() {
            const classroom = document.getElementById("classroom").value;
            const message = document.getElementById("message").value.trim();

            if (!classroom) return showError("กรุณาเลือกห้อง");
            if (!message) return showError("กรุณากรอกข้อความประกาศ");

            const res = await fetch("/api/teacher/announce", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    teacher_line_user_id: lineUserId,
                    teacher_name: lineDisplayName,
                    classroom: classroom,
                    message: message
                })
            });

            const result = await res.json();

            if (!res.ok || !result.success) {
                showError(result.message || "ส่งประกาศไม่สำเร็จ");
                return;
            }

            showSuccess("บันทึกประกาศเรียบร้อยแล้ว");
            document.getElementById("message").value = "";
        }

        function showSuccess(msg) {
            const box = document.getElementById("statusBox");
            box.className = "status success";
            box.innerHTML = msg;
        }

        function showError(msg) {
            const box = document.getElementById("statusBox");
            box.className = "status error";
            box.innerHTML = msg;
        }

        main();
    </script>
</body>
</html>
