<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ประกาศถึงห้องเรียน</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <style>
        * { box-sizing: border-box; }

        body {
            font-family: Arial, "Tahoma", sans-serif;
            background: #f4f7fb;
            margin: 0;
            padding: 16px;
            color: #222;
        }

        .container {
            max-width: 560px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 18px;
            padding: 22px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }

        h1 {
            text-align: center;
            color: #1f5eff;
            font-size: 24px;
            margin: 0 0 8px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 18px;
        }

        .hint {
            background: #eef4ff;
            border: 1px solid #c8d9ff;
            color: #2450a4;
            border-radius: 12px;
            padding: 12px;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-top: 14px;
            margin-bottom: 6px;
            font-weight: bold;
            font-size: 15px;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 13px 14px;
            border: 1px solid #d6dbe6;
            border-radius: 12px;
            font-size: 16px;
            background: #fbfcff;
            outline: none;
        }

        textarea {
            min-height: 130px;
            resize: vertical;
            line-height: 1.5;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: #1f5eff;
            background: #ffffff;
        }

        button {
            width: 100%;
            margin-top: 22px;
            padding: 14px;
            border: none;
            border-radius: 14px;
            background: #1f5eff;
            color: #fff;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
        }

        button:disabled {
            background: #9aa9d6;
            cursor: not-allowed;
        }

        .message {
            margin-top: 16px;
            padding: 12px;
            border-radius: 12px;
            display: none;
            font-size: 15px;
            line-height: 1.5;
            white-space: pre-line;
        }

        .success {
            background: #e8f8ee;
            color: #137333;
            border: 1px solid #bde8ca;
        }

        .error {
            background: #fdeaea;
            color: #b3261e;
            border: 1px solid #f4b4b4;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>ประกาศถึงห้องเรียน</h1>
    <div class="subtitle">
        ใช้สำหรับบันทึกประกาศให้นักเรียนในห้องเปิดดูจากเมนูประกาศ
    </div>

    <div class="hint">
        <b>ตัวอย่างประกาศ</b><br>
        พรุ่งนี้ให้นักเรียนนำสมุดวิทยาศาสตร์มาด้วย<br>
        หรือ<br>
        ใบงานที่ 1 ส่งได้ถึงวันที่ 20 พฤษภาคม เวลา 23:59 น.
    </div>

    <label for="teacherName">ชื่อครู</label>
    <input type="text" id="teacherName" placeholder="ตัวอย่าง: ครูสมชาย">

    <label for="classroom">เลือกห้อง</label>
    <select id="classroom">
        <option value="">กำลังโหลดห้อง...</option>
    </select>

    <label for="message">ข้อความประกาศ</label>
    <textarea id="message" placeholder="ตัวอย่าง: พรุ่งนี้ให้นักเรียนนำสมุดวิทยาศาสตร์มาด้วย"></textarea>

    <button id="sendBtn" onclick="sendAnnouncement()">ส่งประกาศ</button>

    <div id="messageBox" class="message"></div>
</div>

<script>
    const RAW_LIFF_ID = "{{ liff_id }}";
    const LIFF_ID = String(RAW_LIFF_ID || "").trim().replace("https://liff.line.me/", "");
    let teacherLineUserId = "";

    async function main() {
        try {
            await liff.init({ liffId: LIFF_ID });

            if (!liff.isLoggedIn()) {
                liff.login();
                return;
            }

            const profile = await liff.getProfile();
            teacherLineUserId = profile.userId;

            await loadRooms();

        } catch (error) {
            showMessage("เปิด LIFF ไม่สำเร็จ: " + error.message, "error");
        }
    }

    function showMessage(text, type) {
        const box = document.getElementById("messageBox");
        box.innerText = text;
        box.className = "message " + type;
        box.style.display = "block";
    }

    async function loadRooms() {
        const select = document.getElementById("classroom");

        try {
            const res = await fetch("/api/teacher/my-rooms?teacher_line_user_id=" + encodeURIComponent(teacherLineUserId));
            const data = await res.json();

            select.innerHTML = "";

            if (!data.success) {
                select.innerHTML = `<option value="">โหลดห้องไม่สำเร็จ</option>`;
                showMessage(data.message || "โหลดห้องไม่สำเร็จ", "error");
                return;
            }

            const rooms = data.rooms || [];

            if (rooms.length === 0) {
                select.innerHTML = `<option value="">ยังไม่ได้ตั้งค่าห้อง</option>`;
                showMessage("ยังไม่ได้ตั้งค่าห้อง กรุณาไปเมนูตั้งค่าห้องก่อน", "error");
                return;
            }

            select.innerHTML = `<option value="">-- เลือกห้อง --</option>`;

            rooms.forEach(room => {
                const opt = document.createElement("option");
                opt.value = room;
                opt.textContent = room;
                select.appendChild(opt);
            });

        } catch (error) {
            showMessage("เกิดข้อผิดพลาด: " + error.message, "error");
        }
    }

    async function sendAnnouncement() {
        const teacherName = document.getElementById("teacherName").value.trim();
        const classroom = document.getElementById("classroom").value.trim();
        const message = document.getElementById("message").value.trim();
        const btn = document.getElementById("sendBtn");

        if (!teacherLineUserId) {
            showMessage("ไม่พบ LINE userId กรุณาปิดแล้วเปิดใหม่", "error");
            return;
        }

        if (!classroom) {
            showMessage("กรุณาเลือกห้อง", "error");
            return;
        }

        if (!message) {
            showMessage("กรุณากรอกข้อความประกาศ", "error");
            return;
        }

        btn.disabled = true;
        btn.innerText = "กำลังส่ง...";

        try {
            const res = await fetch("/api/teacher/announce", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    teacher_line_user_id: teacherLineUserId,
                    teacher_name: teacherName,
                    classroom: classroom,
                    message: message
                })
            });

            const data = await res.json();

            if (data.success) {
                showMessage("บันทึกประกาศเรียบร้อยแล้ว\nนักเรียนจะเปิดดูได้จากเมนูประกาศ", "success");
                btn.innerText = "ส่งประกาศสำเร็จ";

                setTimeout(() => {
                    if (liff.isInClient()) {
                        liff.closeWindow();
                    }
                }, 1600);

            } else {
                showMessage(data.message || "ส่งประกาศไม่สำเร็จ", "error");
                btn.disabled = false;
                btn.innerText = "ส่งประกาศ";
            }

        } catch (error) {
            showMessage("เกิดข้อผิดพลาด: " + error.message, "error");
            btn.disabled = false;
            btn.innerText = "ส่งประกาศ";
        }
    }

    main();
</script>

</body>
</html>
